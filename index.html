        // --- 子组件: 设置与备份 ---
        function SettingsView({ settings, user, onLogout, showToast, inventory, groups, salesHistory, setReceiptSettings }) {
            const fileRef = useRef(null);
            
            const handleExport = () => {
                const data = { receiptSettings: settings, inventory, groups, salesHistory, exportDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `TabiTabi_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click(); URL.revokeObjectURL(url); showToast("备份文件已下载");
            };

            const handleImport = async (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if(window.confirm('⚠️ 恢复备份将覆盖当前账号在云端的所有数据！确定继续？')) {
                            const { db, doc, setDoc } = window.firebaseServices;
                            const base = ['artifacts', 'tabitabi-pos', 'users', user.uid];
                            if(parsed.receiptSettings) { await setDoc(doc(db, ...base, 'settings', 'receipt'), parsed.receiptSettings); setReceiptSettings(parsed.receiptSettings); }
                            if(parsed.groups) for(const g of parsed.groups) await setDoc(doc(db, ...base, 'groups', g.id), g);
                            if(parsed.inventory) for(const i of parsed.inventory) await setDoc(doc(db, ...base, 'inventory', i.id.toString()), i);
                            if(parsed.salesHistory) for(const s of parsed.salesHistory) await setDoc(doc(db, ...base, 'salesHistory', s.id), s);
                            showToast("数据恢复成功，云端已同步");
                        }
                    } catch(err) { alert("文件解析失败"); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            return (
                <div className="h-full p-6 pt-safe space-y-6 flex flex-col bg-slate-50 overflow-y-auto pb-24">
                    <h1 className="text-2xl font-black tracking-tight">系统设置</h1>
                    
                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex items-center justify-between">
                        <div className="flex items-center gap-3"><div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500"><i className="ph-fill ph-user-circle text-2xl"></i></div><div><p className="text-[10px] text-slate-400 font-black uppercase">Current User</p><p className="font-bold text-sm text-slate-800">{user.email}</p></div></div>
                        <button onClick={onLogout} className="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold text-xs">退出</button>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-4">
                        <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><i className="ph-fill ph-hard-drives text-emerald-500"></i>本地数据备份与恢复</h3>
                        <p className="text-[10px] text-slate-400 font-bold leading-relaxed">一键导出当前账号的所有商品、流水、分组为JSON文件，防止意外丢失。</p>
                        <div className="flex gap-3">
                            <button onClick={handleExport} className="flex-1 bg-emerald-50 text-emerald-600 py-3 rounded-xl font-bold text-xs flex justify-center items-center gap-1 border border-emerald-100"><i className="ph ph-download-simple text-base"></i>导出备份</button>
                            <button onClick={()=>fileRef.current.click()} className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold text-xs flex justify-center items-center gap-1"><i className="ph ph-upload-simple text-base"></i>导入恢复</button>
                            <input type="file" ref={fileRef} onChange={handleImport} accept=".json" className="hidden" />
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-4">
                        <h3 className="font-black text-slate-800 text-sm flex items-center gap-2"><i className="ph-fill ph-receipt text-blue-500"></i>小票基础信息</h3>
                        <div className="p-4 bg-slate-50 rounded-2xl space-y-1">
                            <p className="text-xs font-black text-slate-800 uppercase">{settings?.storeName}</p>
                            <p className="text-[10px] text-slate-500 font-bold">{settings?.regNo}</p>
                            <p className="text-[10px] text-slate-400 leading-relaxed font-medium mt-1">{settings?.address}</p>
                        </div>
                        <p className="text-[10px] text-slate-400 font-bold text-center">高级修改(如Logo、页脚)请在电脑端操作</p>
                    </div>
                </div>
            );
        }

        // --- 独立弹窗: 小票显示 ---
        function ReceiptModal({ data, settings, onClose }) {
            return (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-xl animate-fade-in">
                    <div className="bg-white w-full max-w-sm rounded-[2rem] overflow-hidden shadow-2xl flex flex-col animate-slide-up">
                        <div className="overflow-y-auto p-8 flex-1 no-scrollbar">
                            <div className="thermal-receipt text-center text-[10px] space-y-1">
                                <h2 className="text-lg font-black leading-tight uppercase tracking-tight">{settings?.storeName}</h2>
                                <p className="font-bold">Co.Reg: {settings?.regNo}</p>
                                <p className="whitespace-pre-wrap font-medium text-slate-500">{settings?.address}</p>
                                <div className="receipt-dashed"></div>
                                <div className="text-left space-y-0.5 font-bold">
                                    <p>REF NO: {data.receiptNo}</p><p>DATE: {data.date} {data.time}</p>
                                </div>
                                <div className="receipt-dashed"></div>
                                <table className="w-full text-left">
                                    <thead><tr className="font-black uppercase"><th className="pb-1">Items</th><th className="text-center pb-1">Qty</th><th className="text-right pb-1">Unit</th></tr></thead>
                                    <tbody className="font-medium">{data.items.map((i,idx)=>(<tr key={idx}><td className="py-1 font-black uppercase text-slate-800">{i.product.name}</td><td className="text-center py-1 font-bold">{i.qty}</td><td className="text-right py-1 font-bold">RM{i.customPrice.toFixed(2)}</td></tr>))}</tbody>
                                </table>
                                <div className="receipt-dashed"></div>
                                <div className="space-y-1 font-bold uppercase text-[9px] text-slate-400 pt-1">
                                    <div className="flex justify-between"><span>Subtotal</span><span className="text-slate-800">RM {data.subtotal.toFixed(2)}</span></div>
                                    <div className="flex justify-between"><span>Discount</span><span className="text-slate-800">RM {(data.discount||0).toFixed(2)}</span></div>
                                    <div className="flex justify-between"><span>Rounding</span><span className="text-slate-800">RM {data.rounding.toFixed(2)}</span></div>
                                    <div className="flex justify-between text-base font-black pt-2 text-blue-600 tracking-tighter"><span>Net Total</span><span>RM {data.totalRevenue.toFixed(2)}</span></div>
                                </div>
                                <div className="receipt-dashed"></div>
                                <p className="mt-6 font-black uppercase text-[8px] text-slate-300">{settings?.footerText}</p>
                            </div>
                        </div>
                        <div className="p-6 bg-slate-50 flex gap-2">
                            <button onClick={()=>window.print()} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg">打印</button>
                            <button onClick={onClose} className="flex-1 bg-slate-200 text-slate-600 py-3 rounded-xl font-black">完成</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
